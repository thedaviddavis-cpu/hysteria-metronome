<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hysteria - 93 BPM</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)), 
                        url('hysteria.png') center/cover no-repeat fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            color: white;
            overflow: hidden;
        }

        .metronome-card {
            background: rgba(0, 0, 0, 0.85);
            padding: 40px 50px;
            border-radius: 20px;
            width: 320px;
            text-align: center;
            box-shadow: 0 0 40px rgba(0, 255, 200, 0.3);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .muse {
            color: #ff0033;
            font-size: 2.2em;
            font-weight: bold;
            letter-spacing: 4px;
            text-shadow: 0 0 15px #ff0033;
        }

        .hysteria {
            font-size: 1.1em;
            margin: 8px 0 20px 0;
            letter-spacing: 3px;
        }

        .bpm {
            font-size: 4.5em;
            font-weight: bold;
            color: #00ffcc;
            text-shadow: 0 0 25px #00ffcc;
            margin: 15px 0;
        }

        .visual {
            width: 90px;
            height: 90px;
            margin: 20px auto;
            border-radius: 50%;
            background: #111;
            border: 4px solid #ffcc00;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            transition: all 0.1s;
        }

        .beat {
            background: #ffcc00 !important;
            color: black;
            transform: scale(1.15);
            box-shadow: 0 0 40px #ffcc00;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 20px;
        }

        .btn {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            cursor: pointer;
            border: 5px solid;
            transition: all 0.2s;
        }

        .start-btn {
            border-color: #ff0033;
            background: url('Dom.jpg') center/cover;
        }

        .stop-btn {
            border-color: #888;
            background: url('Dom.jpg') center/cover;
            opacity: 0.7;
        }

        .start-btn:hover { border-color: #00ff88; transform: scale(1.1); }
        .stop-btn:hover { border-color: #ccc; transform: scale(1.1); }
    </style>
</head>
<body>
    <div class="metronome-card">
        <div class="muse">MUSE</div>
        <div class="hysteria">HYSTERIA</div>
        <div class="bpm">93 BPM</div>
        
        <div class="visual" id="visual">♪</div>
        
        <div class="buttons">
            <div id="startBtn" class="btn start-btn"></div>
            <div id="stopBtn" class="btn stop-btn"></div>
        </div>
    </div>

    <script>
        let isRunning = false;
        let intervalId = null;
        const bpm = 93;
        const intervalMs = (60 / bpm) * 1000;
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();

        function playClick() {
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.type = 'square';
            osc.frequency.value = 1250;
            gain.gain.value = 0.45;
            gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.07);
            osc.connect(gain);
            gain.connect(audioContext.destination);
            osc.start();
            osc.stop(audioContext.currentTime + 0.07);

            const visual = document.getElementById('visual');
            visual.classList.add('beat');
            setTimeout(() => visual.classList.remove('beat'), 120);
        }

        document.getElementById('startBtn').addEventListener('click', () => {
            if (isRunning) return;
            isRunning = true;
            playClick();
            intervalId = setInterval(playClick, intervalMs);
        });

        document.getElementById('stopBtn').addEventListener('click', () => {
            isRunning = false;
            clearInterval(intervalId);
        });

        document.addEventListener('keydown', e => {
            if (e.code === 'Space') {
                e.preventDefault();
                document.getElementById(isRunning ? 'stopBtn' : 'startBtn').click();
            }
        });
    </script>
</body>
</html>
