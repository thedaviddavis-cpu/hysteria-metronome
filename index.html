<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hysteria - 93 BPM Metronome</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)), 
                        url('hysteria.jpg') center/cover no-repeat fixed;
            color: #fff;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .container {
            background: rgba(0, 0, 0, 0.65);
            padding: 40px 60px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        h1 {
            color: #e60012;
            margin: 0 0 8px 0;
            font-size: 2.8em;
            text-shadow: 0 0 20px #e60012;
        }

        .bpm {
            font-size: 85px;
            font-weight: bold;
            margin: 10px 0 25px 0;
            color: #00ffcc;
            text-shadow: 0 0 30px #00ffcc;
        }

        .visual {
            width: 140px;
            height: 140px;
            margin: 20px auto 30px;
            border-radius: 50%;
            background: rgba(255, 204, 0, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            transition: all 0.1s ease;
            border: 3px solid rgba(255, 204, 0, 0.5);
        }

        .beat {
            background: #ffcc00 !important;
            transform: scale(1.3);
            box-shadow: 0 0 60px #ffcc00;
            color: black;
        }

        /* Dom Button */
        .dom-btn {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: url('dom.jpg') center/cover;
            border: 5px solid #e60012;
            cursor: pointer;
            margin: 15px;
            box-shadow: 0 0 25px rgba(230, 0, 18, 0.6);
            transition: all 0.2s;
        }

        .dom-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 0 40px rgba(230, 0, 18, 0.9);
        }

        .dom-btn:active {
            transform: scale(0.95);
        }

        .start { border-color: #00cc66; box-shadow: 0 0 25px rgba(0, 204, 102, 0.6); }
    </style>
</head>
<body>
    <div class="container">
        <h1>MUSE</h1>
        <h2>HYSTERIA</h2>
        <div class="bpm">93 BPM</div>
        <div class="visual" id="visual">♪</div>
        
        <button id="startBtn" class="dom-btn start"></button>
        <button id="stopBtn" class="dom-btn" style="background: url('dom.jpg') center/cover; border-color: #666;"></button>
    </div>

    <script>
        let isRunning = false;
        let intervalId = null;
        const bpm = 93;
        const intervalMs = (60 / bpm) * 1000;
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        
        function playClick() {
            const oscillator = audioContext.createOscillator();
            const gain = audioContext.createGain();
            oscillator.type = 'square';
            oscillator.frequency.setValueAtTime(1250, audioContext.currentTime);
            gain.gain.setValueAtTime(0.45, audioContext.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.07);
            oscillator.connect(gain);
            gain.connect(audioContext.destination);
            oscillator.start();
            oscillator.stop(audioContext.currentTime + 0.07);
            
            const visual = document.getElementById('visual');
            visual.classList.add('beat');
            setTimeout(() => visual.classList.remove('beat'), 110);
        }
        
        document.getElementById('startBtn').addEventListener('click', () => {
            if (isRunning) return;
            isRunning = true;
            document.getElementById('startBtn').style.borderColor = '#00cc66';
            playClick();
            intervalId = setInterval(playClick, intervalMs);
        });
        
        document.getElementById('stopBtn').addEventListener('click', () => {
            isRunning = false;
            clearInterval(intervalId);
            document.getElementById('startBtn').style.borderColor = '#e60012';
        });
        
        document.addEventListener('keydown', e => {
            if (e.code === 'Space') {
                e.preventDefault();
                document.getElementById(isRunning ? 'stopBtn' : 'startBtn').click();
            }
        });
    </script>
</body>
</html>
