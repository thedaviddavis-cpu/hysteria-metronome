<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hysteria - 93 BPM Metronome</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)), 
                        url('hysteria.jpg') center/cover no-repeat fixed;
            color: #fff;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .container {
            background: rgba(0, 0, 0, 0.6);
            padding: 40px 60px;
            border-radius: 20px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        h1 {
            color: #e60012;
            margin: 0 0 10px 0;
            font-size: 2.8em;
            text-shadow: 0 0 20px #e60012;
        }

        .bpm {
            font-size: 90px;
            font-weight: bold;
            margin: 15px 0;
            color: #00ffcc;
            text-shadow: 0 0 30px #00ffcc;
        }

        .visual {
            width: 140px;
            height: 140px;
            margin: 30px auto;
            border-radius: 50%;
            background: rgba(255, 204, 0, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            transition: all 0.1s ease;
            border: 3px solid rgba(255, 204, 0, 0.4);
        }

        .beat {
            background: #ffcc00 !important;
            transform: scale(1.25);
            box-shadow: 0 0 50px #ffcc00;
            color: black;
        }

        button {
            background: #e60012;
            color: white;
            border: none;
            padding: 16px 45px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            margin: 10px;
            font-weight: bold;
        }

        .start {
            background: #00cc66;
        }
        
        .start:hover { background: #00ff88; }
    </style>
</head>
<body>
    <div class="container">
        <h1>MUSE</h1>
        <h2>HYSTERIA</h2>
        <div class="bpm">93 BPM</div>
        <div class="visual" id="visual">♪</div>
        
        <button id="startBtn" class="start">START METRONOME</button>
        <button id="stopBtn">STOP</button>
    </div>

    <script>
        let isRunning = false;
        let intervalId = null;
        const bpm = 93;
        const intervalMs = (60 / bpm) * 1000;
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        
        function playClick() {
            const oscillator = audioContext.createOscillator();
            const gain = audioContext.createGain();
            oscillator.type = 'square';
            oscillator.frequency.setValueAtTime(1200, audioContext.currentTime);
            gain.gain.setValueAtTime(0.4, audioContext.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.06);
            oscillator.connect(gain);
            gain.connect(audioContext.destination);
            oscillator.start();
            oscillator.stop(audioContext.currentTime + 0.06);
            
            const visual = document.getElementById('visual');
            visual.classList.add('beat');
            setTimeout(() => visual.classList.remove('beat'), 100);
        }
        
        document.getElementById('startBtn').addEventListener('click', () => {
            if (isRunning) return;
            isRunning = true;
            document.getElementById('startBtn').textContent = 'RUNNING...';
            playClick();
            intervalId = setInterval(playClick, intervalMs);
        });
        
        document.getElementById('stopBtn').addEventListener('click', () => {
            isRunning = false;
            clearInterval(intervalId);
            document.getElementById('startBtn').textContent = 'START METRONOME';
        });
        
        // Spacebar toggle
        document.addEventListener('keydown', e => {
            if (e.code === 'Space') {
                e.preventDefault();
                const btn = isRunning ? 'stopBtn' : 'startBtn';
                document.getElementById(btn).click();
            }
        });
    </script>
</body>
</html>
